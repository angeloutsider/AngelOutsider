<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Angel Outsider</title>
  <link rel="stylesheet" href="/Blog/static/css/admin-style.css">
</head>
<body>
  <div class="admin-wrapper">
    <header class="admin-header">
      <div class="admin-logo">Angel Outsider</div>
      <div class="admin-subtitle">Post Manager</div>
    </header>

    <!-- Auth section -->
    <div id="authSection" class="auth-section">
      <div class="auth-card">
        <div id="connectStep">
          <h2>Connect to GitHub</h2>
          <p>Authorize this app to manage your blog posts.</p>
          <button id="connectBtn" class="btn-primary">Connect with GitHub</button>
        </div>
        <div id="deviceStep" style="display:none;">
          <h2>Enter this code on GitHub</h2>
          <p>Open <a id="verificationUrl" href="https://github.com/login/device" target="_blank" rel="noopener">github.com/login/device</a> and enter:</p>
          <div id="userCode" class="device-code">—</div>
          <p id="pollStatus" class="poll-status">Waiting for authorization…</p>
        </div>
      </div>
    </div>

    <!-- Main section (shown after auth) -->
    <div id="mainSection" class="main-section" style="display:none;">
      <div class="section-header">
        <h2>Blog Posts</h2>
        <button id="newPostBtn" class="btn-primary">+ New Post</button>
      </div>
      <div id="postsLoading" class="loading-msg">Loading posts from GitHub...</div>
      <div id="postsList" class="posts-list"></div>
      <div id="postsError" class="error-msg" style="display:none;"></div>
      <div class="section-footer">
        <button id="signOutBtn" class="btn-ghost">Disconnect</button>
      </div>
    </div>
  </div>

  <script>window.siteBaseUrl = "/Blog/";</script>
  <script src="/Blog/static/js/admin.js"></script>
</body>
</html>
